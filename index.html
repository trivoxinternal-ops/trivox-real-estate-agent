<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trivox AI — Real Estate Consultant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ── Design Tokens ─────────────────────────────────────────────── */
    :root {
      --primary:       #2E61FE;
      --primary-dim:   rgba(46, 97, 254, 0.12);
      --accent:        #00F0FF;
      --accent-dim:    rgba(0, 240, 255, 0.08);
      --bg:            #090B14;
      --surface:       #0F1120;
      --card:          #161928;
      --card-hover:    #1C2035;
      --border:        rgba(46, 97, 254, 0.14);
      --border-focus:  rgba(46, 97, 254, 0.5);
      --text:          #E2E5EF;
      --text-muted:    #636B88;
      --text-dim:      #9CA3BF;
      --success:       #22C55E;
      --gradient:      linear-gradient(135deg, #2E61FE 0%, #00F0FF 100%);
      --gradient-soft: linear-gradient(135deg, rgba(46,97,254,0.15) 0%, rgba(0,240,255,0.08) 100%);
      --shadow-glow:   0 0 40px rgba(46, 97, 254, 0.12);
      --radius-sm:     8px;
      --radius-md:     14px;
      --radius-lg:     20px;
      --radius-xl:     28px;
    }

    /* ── Reset & Base ──────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: 'Sora', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Layout Shell ──────────────────────────────────────────────── */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
      position: relative;
    }

    /* Subtle mesh background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(46, 97, 254, 0.09) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(0, 240, 255, 0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: rgba(9, 11, 20, 0.85);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .logo-img {
      height: 30px;
      width: auto;
      object-fit: contain;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: rgba(34, 197, 94, 0.08);
      border: 1px solid rgba(34, 197, 94, 0.25);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      color: var(--success);
      letter-spacing: 0.03em;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse-dot 2.4s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.55; transform: scale(0.85); }
    }

    /* ── Agent Bar ──────────────────────────────────────────────────── */
    .agent-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 9;
    }

    .agent-avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .agent-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 18px rgba(46, 97, 254, 0.3);
      padding: 10px;
    }

    .agent-avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .agent-online-dot {
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 13px;
      height: 13px;
      background: var(--success);
      border-radius: 50%;
      border: 2px solid var(--surface);
    }

    .agent-info-text h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .agent-info-text p {
      font-size: 11.5px;
      color: var(--text-muted);
      margin-top: 2px;
      line-height: 1.4;
    }

    .powered-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: var(--gradient-soft);
      border: 1px solid rgba(46, 97, 254, 0.2);
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    /* ── Chat Area ──────────────────────────────────────────────────── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb {
      background: rgba(46, 97, 254, 0.2);
      border-radius: 2px;
    }

    /* ── Messages ───────────────────────────────────────────────────── */
    .msg-row {
      display: flex;
      gap: 10px;
      max-width: 82%;
      animation: msg-in 0.28s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg-row.assistant { align-self: flex-start; }
    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .msg-row.assistant .msg-avatar {
      background: var(--gradient);
      color: #fff;
      box-shadow: 0 0 12px rgba(46, 97, 254, 0.25);
      padding: 7px;
    }

    .msg-row.assistant .msg-avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .msg-row.user .msg-avatar {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    .msg-bubble {
      padding: 13px 17px;
      border-radius: var(--radius-lg);
      font-size: 13.5px;
      line-height: 1.65;
      word-break: break-word;
    }

    .msg-row.assistant .msg-bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-top-left-radius: var(--radius-sm);
      color: var(--text);
    }

    .msg-row.user .msg-bubble {
      background: var(--primary);
      color: #fff;
      border-top-right-radius: var(--radius-sm);
      box-shadow: 0 4px 20px rgba(46, 97, 254, 0.25);
    }

    /* ── Typing Indicator ───────────────────────────────────────────── */
    .typing-row {
      display: flex;
      gap: 10px;
      align-self: flex-start;
      animation: msg-in 0.28s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .typing-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 4px;
      padding: 7px;
    }

    .typing-avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      border-top-left-radius: var(--radius-sm);
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce-dot 1.4s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.18s; }
    .typing-dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce-dot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.45; }
      30%            { transform: translateY(-7px); opacity: 1; }
    }

    /* ── Quick Replies ──────────────────────────────────────────────── */
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 20px 4px 62px;
      flex-shrink: 0;
    }

    .quick-reply-btn {
      padding: 8px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-family: 'Sora', sans-serif;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, color 0.18s, transform 0.15s;
    }

    .quick-reply-btn:hover {
      background: var(--primary-dim);
      border-color: rgba(46, 97, 254, 0.4);
      color: var(--text);
      transform: translateY(-1px);
    }

    /* ── Lead Capture Card ──────────────────────────────────────────── */
    .lead-card {
      margin: 4px 0;
      padding: 20px;
      background: linear-gradient(135deg, rgba(46, 97, 254, 0.08) 0%, rgba(0, 240, 255, 0.04) 100%);
      border: 1px solid rgba(46, 97, 254, 0.28);
      border-radius: var(--radius-lg);
      animation: msg-in 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .lead-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .lead-card-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .lead-card h3 {
      font-size: 14px;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .lead-card p {
      font-size: 12.5px;
      color: var(--text-dim);
      line-height: 1.55;
      margin-bottom: 14px;
    }

    .lead-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 16px;
    }

    .lead-tag {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 11px;
      background: rgba(46, 97, 254, 0.1);
      border: 1px solid rgba(46, 97, 254, 0.2);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
    }

    .book-btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 11px 20px;
      background: var(--gradient);
      border: none;
      border-radius: var(--radius-md);
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 4px 16px rgba(46, 97, 254, 0.3);
    }

    .book-btn:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(46, 97, 254, 0.4);
    }

    .book-btn:active { transform: translateY(0); }

    /* ── Input Area ─────────────────────────────────────────────────── */
    .input-area {
      padding: 14px 20px 18px;
      background: rgba(9, 11, 20, 0.9);
      backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .input-box {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 10px 10px 10px 18px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-box:focus-within {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 4px rgba(46, 97, 254, 0.08);
    }

    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Sora', sans-serif;
      font-size: 13.5px;
      color: var(--text);
      resize: none;
      line-height: 1.55;
      max-height: 130px;
      padding: 4px 0;
    }

    #msg-input::placeholder { color: var(--text-muted); }

    #msg-input:disabled { opacity: 0.5; cursor: not-allowed; }

    .send-btn {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      border: none;
      border-radius: var(--radius-md);
      background: var(--gradient);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 2px 10px rgba(46, 97, 254, 0.25);
    }

    .send-btn:hover:not(:disabled) {
      transform: scale(1.07);
      box-shadow: 0 4px 16px rgba(46, 97, 254, 0.4);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .input-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
    }

    .input-footer span {
      font-size: 10.5px;
      color: var(--text-muted);
    }

    .input-footer .dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    /* ── Calendly Modal ─────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 6, 14, 0.88);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      width: 100%;
      max-width: 640px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6), var(--shadow-glow);
      transform: scale(0.96);
      transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .modal-overlay.open .modal { transform: scale(1); }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .modal-head-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .modal-head-icon {
      width: 30px;
      height: 30px;
      border-radius: var(--radius-sm);
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-head h3 {
      font-size: 14px;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .modal-close {
      width: 30px;
      height: 30px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      line-height: 1;
    }

    .modal-close:hover { background: var(--card); color: var(--text); }

    .calendly-frame {
      width: 100%;
      height: 560px;
      border: none;
      flex: 1;
    }

    /* ── Divider (date) ─────────────────────────────────────────────── */
    .chat-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 4px 0;
    }

    .chat-divider::before, .chat-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .header { padding: 12px 16px; }
      .agent-bar { padding: 12px 16px; }
      .powered-badge { display: none; }
      .chat-area { padding: 16px 12px; }
      .msg-row { max-width: 92%; }
      .input-area { padding: 10px 12px 14px; }
      .quick-replies { padding-left: 52px; }
    }
  </style>
</head>

<body>
  <div class="shell">

    <!-- ── Header ──────────────────────────────────────────────────── -->
    <header class="header">
      <div class="logo">
        <img src="/assets/logo-white.png" alt="Trivox AI" class="logo-img" />
      </div>
      <div class="header-right">
        <div class="status-pill">
          <div class="status-dot"></div>
          AI Online
        </div>
      </div>
    </header>

    <!-- ── Agent Bar ────────────────────────────────────────────────── -->
    <div class="agent-bar">
      <div class="agent-avatar-wrap">
        <div class="agent-avatar">
          <img src="/assets/icon-color.png" alt="Trivox AI" />
        </div>
        <div class="agent-online-dot"></div>
      </div>
      <div class="agent-info-text">
        <h2>Alex — AI Real Estate Consultant</h2>
        <p>Trivox AI &nbsp;·&nbsp; Responds instantly &nbsp;·&nbsp; Lead qualification specialist</p>
      </div>
      <div class="powered-badge">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
          <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="currentColor"/>
        </svg>
        Claude Opus 4.6
      </div>
    </div>

    <!-- ── Chat Area ─────────────────────────────────────────────────── -->
    <div class="chat-area" id="chatArea">
      <div class="chat-divider">Start of conversation</div>
    </div>

    <!-- ── Quick Replies (shown after initial greeting) ─────────────── -->
    <div class="quick-replies" id="quickReplies" style="display:none;">
      <button class="quick-reply-btn" onclick="sendQuick('I\'m an investor')">🏦 I\'m an Investor</button>
      <button class="quick-reply-btn" onclick="sendQuick('I\'m looking to buy a property')">🏠 I Want to Buy</button>
      <button class="quick-reply-btn" onclick="sendQuick('I\'m looking to rent')">🔑 I\'m Renting</button>
    </div>

    <!-- ── Input Area ────────────────────────────────────────────────── -->
    <div class="input-area">
      <div class="input-box">
        <textarea
          id="msg-input"
          placeholder="Type your message…"
          rows="1"
          aria-label="Message"
        ></textarea>
        <button class="send-btn" id="send-btn" aria-label="Send">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
            <path d="M22 2L11 13" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <span>Trivox AI Real Estate</span>
        <div class="dot"></div>
        <span>Intelligent Lead Qualification</span>
        <div class="dot"></div>
        <span>Powered by Claude</span>
      </div>
    </div>

  </div><!-- /shell -->

  <!-- ── Calendly Modal ─────────────────────────────────────────────── -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-head-left">
          <div class="modal-head-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="4" width="18" height="18" rx="2.5" stroke="#fff" stroke-width="2"/>
              <line x1="3" y1="10" x2="21" y2="10" stroke="#fff" stroke-width="2"/>
              <line x1="8" y1="2" x2="8" y2="6" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
              <line x1="16" y1="2" x2="16" y2="6" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <h3>Book a Free Trivox AI Consultation</h3>
        </div>
        <button class="modal-close" id="modal-close" aria-label="Close">×</button>
      </div>
      <iframe
        id="calendly-frame"
        class="calendly-frame"
        src=""
        title="Schedule a consultation"
      ></iframe>
    </div>
  </div>

  <script>
    // ── Configuration ───────────────────────────────────────────────
    // ↓ Replace this with your actual Calendly link
    const CALENDLY_URL = 'https://calendly.com/trivoxinternal/intro-call';

    // ── State ────────────────────────────────────────────────────────
    let history = [];       // { role: 'user'|'assistant', content: string }[]
    let busy    = false;
    let quickRepliesShown = false;

    // ── DOM ──────────────────────────────────────────────────────────
    const chatArea     = document.getElementById('chatArea');
    const msgInput     = document.getElementById('msg-input');
    const sendBtn      = document.getElementById('send-btn');
    const quickReplies = document.getElementById('quickReplies');
    const modalOverlay = document.getElementById('modal-overlay');
    const calendlyFrm  = document.getElementById('calendly-frame');
    const modalClose   = document.getElementById('modal-close');

    // ── Helpers ──────────────────────────────────────────────────────

    function scrollBottom(instant) {
      chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: instant ? 'auto' : 'smooth' });
    }

    function setInputDisabled(disabled) {
      busy             = disabled;
      msgInput.disabled = disabled;
      sendBtn.disabled  = disabled;
    }

    function autoResize() {
      msgInput.style.height = 'auto';
      msgInput.style.height = Math.min(msgInput.scrollHeight, 130) + 'px';
    }

    // ── Render helpers ───────────────────────────────────────────────

    /**
     * Append a user or assistant bubble.
     * Returns the bubble <div> so we can stream-append text into it.
     */
    function appendBubble(role, text) {
      const row = document.createElement('div');
      row.className = `msg-row ${role}`;

      const av = document.createElement('div');
      av.className = 'msg-avatar';
      if (role === 'assistant') {
        av.innerHTML = '<img src="/assets/icon-color.png" alt="Trivox AI" />';
      } else {
        av.textContent = 'U';
      }

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      if (text) bubble.innerHTML = formatText(text);

      row.appendChild(av);
      row.appendChild(bubble);
      chatArea.appendChild(row);
      scrollBottom();
      return bubble;
    }

    /** Minimal formatting: line breaks only */
    function formatText(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    function showTyping() {
      const row = document.createElement('div');
      row.className = 'typing-row';
      row.id = 'typing-row';

      const av = document.createElement('div');
      av.className = 'typing-avatar';
      av.innerHTML = '<img src="/assets/icon-color.png" alt="Trivox AI" />';

      const bubble = document.createElement('div');
      bubble.className = 'typing-bubble';
      bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

      row.appendChild(av);
      row.appendChild(bubble);
      chatArea.appendChild(row);
      scrollBottom();
    }

    function hideTyping() {
      document.getElementById('typing-row')?.remove();
    }

    function showLeadCard(data) {
      const row = document.createElement('div');
      row.className = 'msg-row assistant';

      const av = document.createElement('div');
      av.className = 'msg-avatar';
      av.textContent = 'A';

      const card = document.createElement('div');
      card.className = 'lead-card';

      const tags = [];
      if (data.lead_type) tags.push({ icon: '👤', val: data.lead_type.charAt(0).toUpperCase() + data.lead_type.slice(1) });
      if (data.budget)    tags.push({ icon: '💰', val: data.budget });
      if (data.location)  tags.push({ icon: '📍', val: data.location });
      if (data.timeline)  tags.push({ icon: '⏱', val: data.timeline });
      if (data.property_type) tags.push({ icon: '🏠', val: data.property_type });

      const tagsHTML = tags.map(t =>
        `<div class="lead-tag"><span>${t.icon}</span>${t.val}</div>`
      ).join('');

      card.innerHTML = `
        <div class="lead-card-header">
          <img src="/assets/logo-white.png" alt="Trivox AI" style="height:22px;width:auto;object-fit:contain;" />
        </div>
        <p>Your details have been captured by Trivox AI. A specialist will reach out with personalized options. Ready to talk now?</p>
        ${tagsHTML ? `<div class="lead-tags">${tagsHTML}</div>` : ''}
        <button class="book-btn" id="bookCallBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="4" width="18" height="18" rx="2.5" stroke="#fff" stroke-width="2"/>
            <line x1="3" y1="10" x2="21" y2="10" stroke="#fff" stroke-width="2"/>
            <line x1="8" y1="2" x2="8" y2="6" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <line x1="16" y1="2" x2="16" y2="6" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Book Free Consultation
        </button>
      `;

      row.appendChild(av);
      row.appendChild(card);
      chatArea.appendChild(row);
      scrollBottom();

      document.getElementById('bookCallBtn').addEventListener('click', openCalendly);
    }

    function openCalendly() {
      calendlyFrm.src = CALENDLY_URL;
      modalOverlay.classList.add('open');
    }

    function closeModal() {
      modalOverlay.classList.remove('open');
      setTimeout(() => { calendlyFrm.src = ''; }, 300);
    }

    // ── Initial Greeting ─────────────────────────────────────────────

    const GREETING =
      "Hi there! I'm Alex, your AI real estate consultant at Trivox AI.\n\n" +
      "I'm here to help match you with the right property opportunities and connect you with a specialist.\n\n" +
      "To get started — are you looking to invest in real estate, purchase a home, or find a rental?";

    function init() {
      const bubble = appendBubble('assistant', '');
      let i = 0;
      const chars = GREETING.split('');
      const interval = setInterval(() => {
        if (i < chars.length) {
          bubble.innerHTML = formatText(GREETING.slice(0, ++i));
          scrollBottom();
        } else {
          clearInterval(interval);
          history.push({ role: 'assistant', content: GREETING });
          showQuickReplies();
        }
      }, 14);
    }

    function showQuickReplies() {
      if (!quickRepliesShown) {
        quickReplies.style.display = 'flex';
        quickRepliesShown = true;
      }
    }

    function hideQuickReplies() {
      quickReplies.style.display = 'none';
    }

    // ── Send Message ─────────────────────────────────────────────────

    async function send(text) {
      if (!text || busy) return;

      hideQuickReplies();
      appendBubble('user', text);
      history.push({ role: 'user', content: text });

      setInputDisabled(true);
      showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            conversationHistory: history.slice(0, -1), // all but the user msg we just pushed
          }),
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();

        let assistantText = '';
        let bubble        = null;
        let leadCaptured  = false;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const raw = decoder.decode(value, { stream: true });

          for (const line of raw.split('\n')) {
            if (!line.startsWith('data: ')) continue;

            let event;
            try { event = JSON.parse(line.slice(6)); }
            catch { continue; }

            if (event.type === 'text') {
              if (!bubble) {
                hideTyping();
                bubble = appendBubble('assistant', '');
              }
              assistantText += event.content;
              bubble.innerHTML = formatText(assistantText);
              scrollBottom();

            } else if (event.type === 'lead_captured') {
              leadCaptured = true;
              setTimeout(() => showLeadCard(event.data), 600);

            } else if (event.type === 'done') {
              if (assistantText) {
                history.push({ role: 'assistant', content: assistantText });
              }

            } else if (event.type === 'error') {
              hideTyping();
              appendBubble('assistant', event.message || 'Something went wrong. Please try again.');
            }
          }
        }

        hideTyping();

      } catch (err) {
        hideTyping();
        appendBubble('assistant', 'I encountered a connection issue. Please try again in a moment.');
        console.error(err);
      } finally {
        setInputDisabled(false);
        msgInput.focus();
      }
    }

    function sendQuick(text) {
      msgInput.value = '';
      send(text);
    }

    // ── Event Listeners ──────────────────────────────────────────────

    sendBtn.addEventListener('click', () => {
      const val = msgInput.value.trim();
      if (!val) return;
      msgInput.value = '';
      autoResize();
      send(val);
    });

    msgInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const val = msgInput.value.trim();
        if (!val) return;
        msgInput.value = '';
        autoResize();
        send(val);
      }
    });

    msgInput.addEventListener('input', autoResize);

    modalClose.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modalOverlay.classList.contains('open')) closeModal();
    });

    // ── Boot ─────────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
